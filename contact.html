<section class="wrap">
  <span class="tag">Say hello</span>
  <h1 class="reveal-l">Contact</h1>
  <form class="reveal-u" action="[formspree.io](https://formspree.io/f/YOUR_FORM_ID)" method="POST"
        style="margin-top:3rem;max-width:560px;display:grid;gap:1rem">
    <input name="name" placeholder="Your name" required
      style="background:var(--bg2);border:1px solid rgba(255,255,255,.12);color:var(--ink);padding:1rem;font-family:var(--mono)">
    <input name="email" type="email" placeholder="Email" required
      style="background:var(--bg2);border:1px solid rgba(255,255,255,.12);color:var(--ink);padding:1rem;font-family:var(--mono)">
    <textarea name="message" rows="5" placeholder="Tell me about the project…" required
      style="background:var(--bg2);border:1px solid rgba(255,255,255,.12);color:var(--ink);padding:1rem;font-family:var(--mono)"></textarea>
    <button class="btn" type="submit">Send it</button>
  </form>
  <p style="margin-top:2rem;font-family:var(--mono)">or email directly → <a class="accent" href="mailto:you@email.com">you@email.com</a></p>
</section>
